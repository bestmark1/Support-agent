services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fitmentor-postgres
    environment:
      POSTGRES_DB: fitmentor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitmentor"]
      interval: 5s
      timeout: 5s
      retries: 10

  kb_api:
    build:
      context: .
      dockerfile: Dockerfile.kb_api
    container_name: fitmentor-kb-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fitmentor
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:

