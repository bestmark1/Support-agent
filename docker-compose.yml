services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fitmentor-postgres
    command: ["/bin/bash", "/app/docker/postgres-start.sh"]
    environment:
      POSTGRES_DB: fitmentor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-start.sh:/app/docker/postgres-start.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitmentor"]
      interval: 5s
      timeout: 5s
      retries: 10

  kb_api:
    build:
      context: .
      dockerfile: Dockerfile.kb_api
    container_name: fitmentor-kb-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fitmentor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8010:8000"
    restart: unless-stopped

volumes:
  postgres_data:
